name: warung_pintar
description: "WarungPintar Lite — Aplikasi manajemen toko UMKM dengan fitur AI restock prediction dan laporan otomatis berbasis Google Gemini."
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  fl_chart: ^0.66.0
  flutter_markdown: ^0.7.7+1

  # State Management
  flutter_riverpod: ^2.4.9

  # Backend & Auth
  supabase_flutter: ^2.3.4
  flutter_secure_storage: ^9.0.0

  # Local Cache (Offline-First)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Export & Sharing
  csv: ^6.0.0
  pdf: ^3.10.8
  share_plus: ^7.2.2
  path_provider: ^2.1.2

  # Utilities
  intl: ^0.19.0
  image_picker: ^1.2.1
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mockito: ^5.4.4

flutter:
  uses-material-design: true
