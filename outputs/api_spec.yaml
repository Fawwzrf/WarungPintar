openapi: "3.0.3"

info:
  title: WarungPintar Lite API
  version: "2.0.0"
  description: |
    REST API for WarungPintar Lite v2.0 — offline-first UMKM inventory & kasbon management.
    All endpoints require a valid Supabase JWT in the Authorization header.
    Role-based access: Admin has full access; Cashier has restricted write access.
  contact:
    name: WarungPintar Dev Team

servers:
  - url: https://{project_ref}.supabase.co/rest/v1
    description: Supabase REST API (PostgREST)
    variables:
      project_ref:
        default: your-project-ref
  - url: https://{project_ref}.supabase.co/functions/v1
    description: Supabase Edge Functions (aggregates, AI, reports)
    variables:
      project_ref:
        default: your-project-ref

# ─────────────────────────────────────────────
# SECURITY
# ─────────────────────────────────────────────
security:
  - BearerAuth: []
  - ApiKeyAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Supabase Auth JWT obtained via /auth/v1/token
    ApiKeyAuth:
      type: apiKey
      in: header
      name: apikey
      description: Supabase anon or service_role key

  # ─────────────────────────────────────────────
  # REUSABLE PARAMETERS
  # ─────────────────────────────────────────────
  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    StoreIdParam:
      name: store_id
      in: query
      required: true
      schema:
        type: string
        format: uuid
      description: Filter by store (RLS enforced on server)
    PathId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  # ─────────────────────────────────────────────
  # SCHEMAS
  # ─────────────────────────────────────────────
  schemas:

    # --- Common ---
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          example: "NOT_FOUND"
        message:
          type: string
          example: "Resource not found"
        details:
          type: object
      required: [code, message]

    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer

    # --- Store ---
    Store:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        owner_id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 255
        address:
          type: string
        phone:
          type: string
          pattern: "^[0-9+\\-\\s]{8,20}$"
        max_credit_default:
          type: number
          format: double
          minimum: 0
          default: 500000
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required: [name]

    StoreCreate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        address:
          type: string
        phone:
          type: string
          pattern: "^[0-9+\\-\\s]{8,20}$"
        max_credit_default:
          type: number
          format: double
          minimum: 0
          default: 500000
      required: [name]

    # --- Product ---
    Product:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        store_id:
          type: string
          format: uuid
        name:
          type: string
        category:
          type: string
        cost_price:
          type: number
          format: double
          minimum: 0
        selling_price:
          type: number
          format: double
          minimum: 0
        stock:
          type: integer
          minimum: 0
          default: 0
        min_stock:
          type: integer
          minimum: 0
          default: 5
        image_url:
          type: string
          format: uri
        is_active:
          type: boolean
          default: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required: [store_id, name, cost_price, selling_price]

    ProductCreate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        category:
          type: string
        cost_price:
          type: number
          format: double
          minimum: 0
        selling_price:
          type: number
          format: double
          minimum: 0
        stock:
          type: integer
          minimum: 0
          default: 0
        min_stock:
          type: integer
          minimum: 0
          default: 5
        image_url:
          type: string
          format: uri
      required: [name, cost_price, selling_price]

    ProductUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        category:
          type: string
        cost_price:
          type: number
          format: double
          minimum: 0
        selling_price:
          type: number
          format: double
          minimum: 0
        min_stock:
          type: integer
          minimum: 0
        image_url:
          type: string
          format: uri
        is_active:
          type: boolean

    StockAdjust:
      type: object
      properties:
        change_amount:
          type: integer
          description: Positive to add, negative to reduce
        reason:
          type: string
          enum: [sale, debt, restock, correction]
      required: [change_amount, reason]

    StockMutation:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        product_id:
          type: string
          format: uuid
        change_amount:
          type: integer
        reason:
          type: string
          enum: [sale, debt, restock, correction]
        created_at:
          type: string
          format: date-time
          readOnly: true

    # --- Customer ---
    Customer:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        store_id:
          type: string
          format: uuid
        name:
          type: string
        phone:
          type: string
        total_debt:
          type: number
          format: double
          minimum: 0
          readOnly: true
        max_credit:
          type: number
          format: double
          minimum: 0
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required: [store_id, name, max_credit]

    CustomerCreate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        phone:
          type: string
          pattern: "^[0-9+\\-\\s]{8,20}$"
        max_credit:
          type: number
          format: double
          minimum: 0
      required: [name, max_credit]

    # --- Debt ---
    DebtItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        debt_id:
          type: string
          format: uuid
          readOnly: true
        product_id:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1
        price_at_time:
          type: number
          format: double
          minimum: 0
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required: [product_id, quantity]

    DebtItemInput:
      type: object
      properties:
        product_id:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1
      required: [product_id, quantity]

    Debt:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        customer_id:
          type: string
          format: uuid
        total_amount:
          type: number
          format: double
          readOnly: true
        paid_amount:
          type: number
          format: double
          readOnly: true
        remaining_amount:
          type: number
          format: double
          readOnly: true
        status:
          type: string
          enum: [unpaid, partial, paid]
          readOnly: true
        items:
          type: array
          items:
            $ref: "#/components/schemas/DebtItem"
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true

    DebtCreate:
      type: object
      properties:
        customer_id:
          type: string
          format: uuid
        items:
          type: array
          items:
            $ref: "#/components/schemas/DebtItemInput"
          minItems: 1
      required: [customer_id, items]

    # --- Payment ---
    DebtPayment:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        debt_id:
          type: string
          format: uuid
        amount:
          type: number
          format: double
          minimum: 0.01
        payment_method:
          type: string
          enum: [cash, transfer, qris]
          default: cash
        created_at:
          type: string
          format: date-time
          readOnly: true
      required: [debt_id, amount]

    DebtPaymentCreate:
      type: object
      properties:
        amount:
          type: number
          format: double
          minimum: 0.01
        payment_method:
          type: string
          enum: [cash, transfer, qris]
          default: cash
      required: [amount]

    # --- Sales Log ---
    SaleCreate:
      type: object
      properties:
        product_id:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1
      required: [product_id, quantity]

    SaleLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        product_id:
          type: string
          format: uuid
        quantity:
          type: integer
        total_price:
          type: number
          format: double
        created_at:
          type: string
          format: date-time
          readOnly: true

    # --- Dashboard ---
    DashboardSummary:
      type: object
      properties:
        total_sales_today:
          type: number
          format: double
          description: Total revenue from cash sales today (Rp)
        active_debts_count:
          type: integer
          description: Number of unpaid or partial debts
        active_debts_total:
          type: number
          format: double
          description: Total outstanding kasbon amount (Rp)
        low_stock_count:
          type: integer
          description: Products at or below min_stock
        sales_chart_7d:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
                format: date
              revenue:
                type: number
                format: double
        top_products_7d:
          type: array
          maxItems: 5
          items:
            type: object
            properties:
              product_id:
                type: string
                format: uuid
              product_name:
                type: string
              total_qty_sold:
                type: integer
              total_revenue:
                type: number
                format: double

    # --- Reports ---
    SalesReportSummary:
      type: object
      properties:
        period_start:
          type: string
          format: date
        period_end:
          type: string
          format: date
        total_revenue:
          type: number
          format: double
        total_profit:
          type: number
          format: double
        total_transactions:
          type: integer
        item_breakdown:
          type: array
          items:
            type: object
            properties:
              product_id:
                type: string
                format: uuid
              product_name:
                type: string
              qty_sold:
                type: integer
              revenue:
                type: number
                format: double
              profit:
                type: number
                format: double

    DebtReportSummary:
      type: object
      properties:
        total_piutang_aktif:
          type: number
          format: double
        customer_ranking:
          type: array
          items:
            type: object
            properties:
              customer_id:
                type: string
                format: uuid
              customer_name:
                type: string
              total_debt:
                type: number
                format: double
        payments_received_period:
          type: number
          format: double

# ─────────────────────────────────────────────
# PATHS
# ─────────────────────────────────────────────
paths:

  # ══════════════════════════════════════════
  # STORES
  # ══════════════════════════════════════════
  /stores:
    get:
      summary: List stores for authenticated user
      operationId: listStores
      tags: [Stores]
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: List of stores
          headers:
            X-RateLimit-Limit:
              schema: { type: integer }
            X-RateLimit-Remaining:
              schema: { type: integer }
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Store"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      summary: Create a new store
      operationId: createStore
      tags: [Stores]
      x-roles: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreCreate"
      responses:
        "201":
          description: Store created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /stores/{id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      summary: Get store by ID
      operationId: getStore
      tags: [Stores]
      responses:
        "200":
          description: Store detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      summary: Update store
      operationId: updateStore
      tags: [Stores]
      x-roles: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreCreate"
      responses:
        "200":
          description: Store updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ══════════════════════════════════════════
  # PRODUCTS
  # ══════════════════════════════════════════
  /products:
    get:
      summary: List products
      operationId: listProducts
      tags: [Inventory]
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/StoreIdParam"
        - name: category
          in: query
          schema:
            type: string
          description: Filter by category
        - name: is_active
          in: query
          schema:
            type: boolean
          description: Filter by active status (default true)
        - name: low_stock
          in: query
          schema:
            type: boolean
          description: If true, return only products where stock <= min_stock
        - name: search
          in: query
          schema:
            type: string
            maxLength: 100
          description: Full-text search on product name (debounce 300ms client-side)
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [name, selling_price, stock, created_at]
            default: name
        - name: sort_order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: asc
      responses:
        "200":
          description: Paginated product list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Product"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      summary: Create a product
      operationId: createProduct
      tags: [Inventory]
      x-roles: [Admin]
      x-rate-limit: 60/minute per store
      parameters:
        - $ref: "#/components/parameters/StoreIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductCreate"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /products/{id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      summary: Get product by ID
      operationId: getProduct
      tags: [Inventory]
      responses:
        "200":
          description: Product detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      summary: Update product (partial)
      operationId: updateProduct
      tags: [Inventory]
      x-roles: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Product updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      summary: Soft-delete product (sets is_active=false)
      operationId: deleteProduct
      tags: [Inventory]
      x-roles: [Admin]
      responses:
        "204":
          description: Product deactivated
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /products/{id}/stock:
    parameters:
      - $ref: "#/components/parameters/PathId"
    post:
      summary: Adjust product stock (atomic)
      operationId: adjustStock
      tags: [Inventory]
      description: |
        Atomically adjusts stock and writes a stock_mutations record.
        Stock cannot go below 0. This is a server-side atomic operation.
        Rate limit: 120/minute per store.
      x-roles: [Admin, Cashier]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StockAdjust"
      responses:
        "200":
          description: Stock adjusted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  product_id:
                    type: string
                    format: uuid
                  new_stock:
                    type: integer
                  mutation:
                    $ref: "#/components/schemas/StockMutation"
        "400":
          description: Invalid adjustment (e.g., would result in negative stock)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /products/{id}/mutations:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      summary: Get stock mutation history for a product
      operationId: listStockMutations
      tags: [Inventory]
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - name: reason
          in: query
          schema:
            type: string
            enum: [sale, debt, restock, correction]
      responses:
        "200":
          description: Mutation history
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/StockMutation"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ══════════════════════════════════════════
  # CUSTOMERS
  # ══════════════════════════════════════════
  /customers:
    get:
      summary: List customers
      operationId: listCustomers
      tags: [Kasbon]
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/StoreIdParam"
        - name: search
          in: query
          schema:
            type: string
            maxLength: 100
        - name: has_debt
          in: query
          schema:
            type: boolean
          description: Filter customers with active debt
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [name, total_debt, created_at]
            default: name
        - name: sort_order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: asc
      responses:
        "200":
          description: Paginated customer list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Customer"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      summary: Create customer
      operationId: createCustomer
      tags: [Kasbon]
      x-roles: [Admin, Cashier]
      parameters:
        - $ref: "#/components/parameters/StoreIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerCreate"
      responses:
        "201":
          description: Customer created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Conflict — phone number already exists in this store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /customers/{id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      summary: Get customer by ID
      operationId: getCustomer
      tags: [Kasbon]
      responses:
        "200":
          description: Customer detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      summary: Update customer
      operationId: updateCustomer
      tags: [Kasbon]
      x-roles: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerCreate"
      responses:
        "200":
          description: Customer updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      summary: Delete customer (only if no active debts)
      operationId: deleteCustomer
      tags: [Kasbon]
      x-roles: [Admin]
      responses:
        "204":
          description: Customer deleted
        "400":
          description: Customer has active debts; cannot delete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ══════════════════════════════════════════
  # DEBTS (KASBON)
  # ══════════════════════════════════════════
  /debts:
    get:
      summary: List debts
      operationId: listDebts
      tags: [Kasbon]
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/StoreIdParam"
        - name: customer_id
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum: [unpaid, partial, paid]
        - name: date_from
          in: query
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          schema:
            type: string
            format: date
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [created_at, total_amount, remaining_amount]
            default: created_at
        - name: sort_order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        "200":
          description: Paginated debt list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Debt"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      summary: Create kasbon transaction
      operationId: createDebt
      tags: [Kasbon]
      x-roles: [Admin, Cashier]
      description: |
        Creates a new debt atomically: validates credit limit, validates stock
        for all items in real-time, deducts stock, records stock_mutations,
        and inserts debt + debt_items in a single transaction.
        Rate limit: 30/minute per store.
      parameters:
        - $ref: "#/components/parameters/StoreIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DebtCreate"
      responses:
        "201":
          description: Debt created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Debt"
        "400":
          description: |
            Validation error. Possible codes:
            - INSUFFICIENT_STOCK
            - CREDIT_LIMIT_EXCEEDED
            - EMPTY_ITEMS
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /debts/{id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      summary: Get debt detail (with items)
      operationId: getDebt
      tags: [Kasbon]
      responses:
        "200":
          description: Debt detail including items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Debt"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /debts/{id}/payments:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      summary: Get payment history for a debt
      operationId: listDebtPayments
      tags: [Kasbon]
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Payment history
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/DebtPayment"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    post:
      summary: Record a payment for a debt
      operationId: createDebtPayment
      tags: [Kasbon]
      x-roles: [Admin, Cashier]
      description: |
        Atomically records payment, updates debts.paid_amount,
        recalculates status (unpaid→partial→paid), and updates
        customers.total_debt.
        Rate limit: 60/minute per store.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DebtPaymentCreate"
      responses:
        "201":
          description: Payment recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  payment:
                    $ref: "#/components/schemas/DebtPayment"
                  debt:
                    $ref: "#/components/schemas/Debt"
        "400":
          description: |
            Validation error. Possible codes:
            - PAYMENT_EXCEEDS_REMAINING
            - DEBT_ALREADY_PAID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ══════════════════════════════════════════
  # SALES LOG (Cash Transactions)
  # ══════════════════════════════════════════
  /sales:
    get:
      summary: List cash sales
      operationId: listSales
      tags: [Sales]
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/StoreIdParam"
        - name: product_id
          in: query
          schema:
            type: string
            format: uuid
        - name: date_from
          in: query
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Paginated sales list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/SaleLog"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      summary: Record a cash sale
      operationId: createSale
      tags: [Sales]
      x-roles: [Admin, Cashier]
      description: |
        Atomically records sale, deducts stock, and writes stock_mutation.
        Rate limit: 120/minute per store.
      parameters:
        - $ref: "#/components/parameters/StoreIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaleCreate"
      responses:
        "201":
          description: Sale recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaleLog"
        "400":
          description: Insufficient stock
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  # ══════════════════════════════════════════
  # DASHBOARD
  # ══════════════════════════════════════════
  /dashboard/summary:
    get:
      summary: Get dashboard summary metrics
      operationId: getDashboardSummary
      tags: [Dashboard]
      description: |
        Returns aggregated metrics for the store dashboard.
        Cached server-side; data refreshed every 10 seconds.
        Rate limit: 30/minute per store.
      parameters:
        - $ref: "#/components/parameters/StoreIdParam"
      responses:
        "200":
          description: Dashboard summary
          headers:
            Cache-Control:
              description: "max-age=10"
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  # ══════════════════════════════════════════
  # REPORTS
  # ══════════════════════════════════════════
  /reports/sales:
    get:
      summary: Get sales report summary
      operationId: getSalesReport
      tags: [Reports]
      x-roles: [Admin]
      parameters:
        - $ref: "#/components/parameters/StoreIdParam"
        - name: period
          in: query
          required: true
          schema:
            type: string
            enum: [daily, weekly, monthly]
        - name: date_from
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Sales report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesReportSummary"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /reports/debts:
    get:
      summary: Get kasbon/debt report summary
      operationId: getDebtReport
      tags: [Reports]
      x-roles: [Admin]
      parameters:
        - $ref: "#/components/parameters/StoreIdParam"
        - name: date_from
          in: query
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Debt report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DebtReportSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /reports/export:
    post:
      summary: Export report as CSV or PDF
      operationId: exportReport
      tags: [Reports]
      x-roles: [Admin]
      description: |
        Triggers async report generation via Supabase Edge Function.
        Returns a signed download URL valid for 1 hour.
        Rate limit: 10/hour per store.
      parameters:
        - $ref: "#/components/parameters/StoreIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                report_type:
                  type: string
                  enum: [sales, debts]
                format:
                  type: string
                  enum: [csv, pdf]
                period:
                  type: string
                  enum: [daily, weekly, monthly]
                date_from:
                  type: string
                  format: date
                date_to:
                  type: string
                  format: date
              required: [report_type, format, date_from, date_to]
      responses:
        "202":
          description: Export job accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id:
                    type: string
                    format: uuid
                  download_url:
                    type: string
                    format: uri
                    description: Signed URL valid for 1 hour
                  expires_at:
                    type: string
                    format: date-time
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"

  # ══════════════════════════════════════════
  # AI ANALYTICS (Edge Functions)
  # ══════════════════════════════════════════
  /ai/restock-prediction:
    get:
      summary: Get AI restock prediction
      operationId: getRestockPrediction
      tags: [AI Analytics]
      x-roles: [Admin]
      description: |
        Returns top 5 products predicted to need restocking based
        on 30-day sales velocity. Powered by Gemini via Edge Function.
        Rate limit: 5/day per store (runs weekly on Monday mornings).
      parameters:
        - $ref: "#/components/parameters/StoreIdParam"
      responses:
        "200":
          description: Restock predictions
          content:
            application/json:
              schema:
                type: object
                properties:
                  generated_at:
                    type: string
                    format: date-time
                  predictions:
                    type: array
                    maxItems: 5
                    items:
                      type: object
                      properties:
                        product_id:
                          type: string
                          format: uuid
                        product_name:
                          type: string
                        current_stock:
                          type: integer
                        avg_daily_sales:
                          type: number
                        days_until_empty:
                          type: integer
                        recommended_qty:
                          type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "503":
          description: AI service temporarily unavailable (non-blocking)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ai/trend-report:
    get:
      summary: Get AI-generated trend summary (Bahasa Indonesia)
      operationId: getTrendReport
      tags: [AI Analytics]
      x-roles: [Admin]
      description: |
        Returns AI-generated text summary of sales trends in Bahasa Indonesia.
        Generated monthly via Gemini. Non-blocking if API unavailable.
        Rate limit: 3/day per store.
      parameters:
        - $ref: "#/components/parameters/StoreIdParam"
        - name: month
          in: query
          schema:
            type: string
            pattern: "^\\d{4}-\\d{2}$"
            example: "2025-07"
      responses:
        "200":
          description: AI trend summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  month:
                    type: string
                  summary:
                    type: string
                    description: AI-generated text in Bahasa Indonesia
                  generated_at:
                    type: string
                    format: date-time
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "503":
          description: AI service temporarily unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ══════════════════════════════════════════
  # STORE MEMBERS
  # ══════════════════════════════════════════
  /stores/{id}/members:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      summary: List store members
      operationId: listStoreMembers
      tags: [Stores]
      x-roles: [Admin]
      responses:
        "200":
          description: Member list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        user_id:
                          type: string
                          format: uuid
                        role:
                          type: string
                          enum: [Admin, Cashier]
                        created_at:
                          type: string
                          format: date-time
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

    post:
      summary: Add member to store
      operationId: addStoreMember
      tags: [Stores]
      x-roles: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id:
                  type: string
                  format: uuid
                role:
                  type: string
                  enum: [Admin, Cashier]
              required: [user_id, role]
      responses:
        "201":
          description: Member added
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: User is already a member of this store

  /stores/{id}/members/{user_id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    patch:
      summary: Update member role
      operationId: updateStoreMemberRole
      tags: [Stores]
      x-roles: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  type: string
                  enum: [Admin, Cashier]
              required: [role]
      responses:
        "200":
          description: Role updated
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      summary: Remove member from store
      operationId: removeStoreMember
      tags: [Stores]
      x-roles: [Admin]
      responses:
        "204":
          description: Member removed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─────────────────────────────────────────────
  # REUSABLE RESPONSES
  # ─────────────────────────────────────────────
  responses: {}

components:
  responses:
    BadRequest:
      description: Bad Request — validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: VALIDATION_ERROR
            message: "selling_price must be >= 0"
    Unauthorized:
      description: Unauthorized — missing or invalid JWT
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: UNAUTHORIZED
            message: "JWT is missing or expired"
    Forbidden:
      description: Forbidden — insufficient role
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: FORBIDDEN
            message: "Cashier role cannot perform this action"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: NOT_FOUND
            message: "Product not found"
    RateLimited:
      description: Too Many Requests
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds until rate limit resets
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: RATE_LIMIT_EXCEEDED
            message: "Too many requests. Retry after 60 seconds."
    InternalError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: INTERNAL_ERROR
            message: "An unexpected error occurred"

# ─────────────────────────────────────────────
# TAGS
# ─────────────────────────────────────────────
tags:
  - name: Stores
    description: Store and member management
  - name: Inventory
    description: Product CRUD and stock management
  - name: Kasbon
    description: Customer and debt (kasbon) management
  - name: Sales
    description: Cash sale transactions
  - name: Dashboard
    description: Aggregated dashboard metrics
  - name: Reports
    description: Sales and kasbon reports + export
  - name: AI Analytics
    description: AI-powered predictions and summaries (Gemini)

# ─────────────────────────────────────────────
# RATE LIMITING RECOMMENDATIONS (x-rate-limit)
# ─────────────────────────────────────────────
# Applied at Supabase Edge Function / API Gateway level:
#
# Global:           300 req/min per JWT token
# List endpoints:   100 req/min per store
# Write endpoints:  60  req/min per store
# Financial writes: 30  req/min per store  (debts, payments)
# Export:           10  req/hour per store
# AI endpoints:     5   req/day per store
#
# Supabase PostgREST built-in: no hard limit,
# rely on connection pooling (PgBouncer) + JWT claims.
# Implement rate limiting in Edge Functions using Deno KV or Upstash Redis.
